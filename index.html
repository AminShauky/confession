<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satu Kejujuran 🌸</title>
    <!-- Tukar font kepada Dancing Script yang sangat romantik -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(135deg, #fff1f2 0%, #fbcfe8 100%);
            background-attachment: fixed;
            font-family: 'Quicksand', sans-serif;
            color: #831843;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
        }

        /* =========================================
           PAGE 1: MASJID
           ========================================= */
        #page-awal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 1s ease;
        }

        .masjid-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            animation: masjidNaik 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes masjidNaik {
            0% { transform: translateY(100vh); }
            100% { transform: translateY(0); }
        }

        .masjid-turun {
            animation: masjidTurun 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards !important;
        }

        @keyframes masjidTurun {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }

        .svg-masjid {
            width: 320px;
            height: auto;
            fill: #be185d;
            opacity: 0.9;
            filter: drop-shadow(0 -10px 20px rgba(244, 114, 182, 0.4));
        }

        .teks-klik {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            text-align: center;
            font-family: 'Dancing Script', cursive; /* Font Romantik */
            font-size: 1.6rem; /* Besarkan sikit untuk cursive */
            font-weight: 700;
            color: #ffffff;
            background: rgba(190, 24, 93, 0.8);
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 85%;
            max-width: 350px;
            opacity: 0;
            animation: teksMuncul 1s ease 1.5s forwards, pulse 2s infinite 2.5s;
        }

        @keyframes teksMuncul {
            to { opacity: 1; }
        }

        @keyframes pulse {
            0% { transform: translateY(-50%) scale(1); }
            50% { transform: translateY(-50%) scale(1.05); }
            100% { transform: translateY(-50%) scale(1); }
        }

        /* =========================================
           PAGE 2: SURAT
           ========================================= */
        #page-surat {
            display: none; 
            min-height: 100vh;
            width: 100%;
            padding: 30px 20px 50px 20px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .kertas-rasmi {
            background-color: #ffffff;
            padding: 40px 25px;
            border-radius: 8px;
            box-shadow: 0 15px 40px rgba(225, 29, 72, 0.15);
            font-family: 'Dancing Script', cursive; /* Font Romantik */
            font-size: 1.6rem; /* Saiz lebih besar supaya jelas dibaca */
            line-height: 1.6;
            color: #4c0519;
            text-align: justify;
            border-left: 5px solid #f472b6;
            max-width: 600px;
            margin: 0 auto;
        }

        .barisan-ayat {
            min-height: 2rem;
            margin-bottom: 10px;
        }

        .butang-bunga-container {
            display: none;
            text-align: center;
            margin-top: 40px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .btn-bunga {
            background: none;
            border: none;
            font-size: 3.5rem;
            cursor: pointer;
            animation: floatBunga 3s ease-in-out infinite;
            filter: drop-shadow(0 5px 10px rgba(244, 114, 182, 0.4));
        }

        @keyframes floatBunga {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .petunjuk-bunga {
            font-family: 'Quicksand', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #db2777;
            margin-top: 5px;
        }

        .kelopak {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            animation: mekar 2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes mekar {
            0% { transform: scale(0) translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(1.5) translateY(-150px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="page-awal">
        <div class="masjid-container" id="masjid-animasi">
            <svg class="svg-masjid" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
                <rect x="10" y="100" width="180" height="20" rx="5" />
                <path d="M 100 30 C 135 30, 140 70, 140 100 L 60 100 C 60 70, 65 30, 100 30 Z" />
                <path d="M 100 10 C 105 10, 108 13, 108 18 C 104 17, 100 20, 100 24 C 95 24, 92 19, 94 14 C 95 11, 97 10, 100 10 Z" fill="#fbcfe8"/>
                <rect x="25" y="50" width="10" height="50" />
                <polygon points="20,50 40,50 30,25" />
                <rect x="165" y="50" width="10" height="50" />
                <polygon points="160,50 180,50 170,25" />
                <path d="M 100 70 C 110 70, 115 80, 115 100 L 85 100 C 85 80, 90 70, 100 70 Z" fill="#fff1f2"/>
            </svg>

            <div class="teks-klik" id="teks-jujur" onclick="bukaSurat()">
                Mungkin masih awal tetapi saya perlu jujur
            </div>
        </div>
    </div>

    <div id="page-surat">
        <div class="kertas-rasmi" id="kandungan-surat">
        </div>

        <div class="butang-bunga-container" id="kotak-bunga">
            <button class="btn-bunga" onclick="keluarkanBunga(event)">🌸</button>
            <div class="petunjuk-bunga">Sentuh bunga ini</div>
        </div>
    </div>

    <script>
        const ayatSurat = [
            "Tarikh: 13 Jun 2026",
            "",
            "Kehadapan kamu yang saya kagumi,",
            "",
            "Mungkin surat ini ditulis dalam format yang agak rasmi dan mengejutkan, tetapi saya rasa ini adalah cara yang paling tepat untuk menyusun bait-bait kata bagi menyatakan niat sebenar saya.",
            "",
            "Sepanjang tempoh perkenalan, kehadiran kamu sentiasa membawa keceriaan dan ketenangan. Setiap posting kamu dan senyuman kamu serta akhlak kamu telah menarik perhatian saya tanpa saya sedari.",
            "",
            "Saya tak boleh dah nak memendam rasa yang semakin tulus ini. Tujuan warkah ini ditulis adalah untuk menyatakan bahawa saya menyimpan perasaan terhadap kamu,dan soalan seperti Nak yangni boleh? itu bukanlah hanya gurauan semata tapi lebih daripada sekadar gurauan biasa.",
            "",
            "Sekiranya jawapan kamu tidak, janganlah merasa conversation kita ini sebagai kejanggalan.",
            "",
            "….walau apa pun jawapan kamu, saya terima dengan hati yang terbuka…."
        ];

        function bukaSurat() {
            const pageAwal = document.getElementById('page-awal');
            const pageSurat = document.getElementById('page-surat');
            const masjid = document.getElementById('masjid-animasi');
            const teks = document.getElementById('teks-jujur');

            teks.style.display = 'none'; 
            masjid.classList.add('masjid-turun'); 

            setTimeout(() => {
                pageAwal.style.display = 'none'; 
                pageSurat.style.display = 'block'; 
                
                setTimeout(() => {
                    pageSurat.style.opacity = '1';
                    taipSurat(0); 
                }, 50);
            }, 1500); 
        }

        function taipSurat(indeksBaris) {
            const ruangSurat = document.getElementById('kandungan-surat');

            if (indeksBaris < ayatSurat.length) {
                let baris = document.createElement('div');
                baris.className = 'barisan-ayat';
                
                if (indeksBaris === ayatSurat.length - 1) {
                    baris.style.fontWeight = 'bold';
                    baris.style.textAlign = 'center';
                    baris.style.marginTop = '30px';
                }

                ruangSurat.appendChild(baris);
                let teksBaris = ayatSurat[indeksBaris];
                let i = 0;

                function taipHuruf() {
                    if (i < teksBaris.length) {
                        baris.innerHTML += teksBaris.charAt(i);
                        i++;
                        window.scrollTo(0, document.body.scrollHeight);
                        setTimeout(taipHuruf, 40);
                    } else {
                        setTimeout(() => taipSurat(indeksBaris + 1), 300);
                    }
                }

                if (teksBaris === "") {
                    setTimeout(() => taipSurat(indeksBaris + 1), 100);
                } else {
                    taipHuruf();
                }

            } else {
                setTimeout(() => {
                    const kotakBunga = document.getElementById('kotak-bunga');
                    kotakBunga.style.display = 'block';
                    window.scrollTo(0, document.body.scrollHeight);
                    setTimeout(() => {
                        kotakBunga.style.opacity = '1';
                    }, 50);
                }, 800);
            }
        }

        function keluarkanBunga(event) {
            const emojis = ['🌸', '🌺', '🌷', '✨', '💖', '🌼'];
            let xKlik = event.clientX || window.innerWidth / 2;
            let yKlik = event.clientY || window.innerHeight / 2;

            for (let i = 0; i < 20; i++) {
                let kelopak = document.createElement('div');
                kelopak.className = 'kelopak';
                kelopak.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                
                kelopak.style.left = xKlik + 'px';
                kelopak.style.top = yKlik + 'px';
                kelopak.style.fontSize = (Math.random() * 20 + 15) + 'px';
                
                let rawakX = (Math.random() - 0.5) * 300; 
                let rawakY = (Math.random() - 1) * 300;   
                
                kelopak.animate([
                    { transform: 'translate(0, 0) scale(0) rotate(0deg)', opacity: 1 },
                    { transform: `translate(${rawakX}px, ${rawakY}px) scale(1.5) rotate(${Math.random() * 360}deg)`, opacity: 0 }
                ], {
                    duration: Math.random() * 1000 + 1000,
                    easing: 'cubic-bezier(0.25, 1, 0.5, 1)',
                    fill: 'forwards'
                });

                document.body.appendChild(kelopak);
                setTimeout(() => kelopak.remove(), 2000);
            }
        }
    </script>

</body>
</html>
